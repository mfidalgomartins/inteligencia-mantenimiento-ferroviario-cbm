<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=outputs/dashboard/centro-control-mantenimiento-ferroviario.html" />
  <title>Centro de Control CBM Ferroviario</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f4f4f5;
      color: #18181b;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      padding: 3rem 2.5rem;
    }
    .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #2f6ae4;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #18181b;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 0.9rem;
      color: #71717a;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #e4e4e7;
      border-top-color: #2f6ae4;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: dark) {
      html, body { background: #111113; color: #f4f4f5; }
      h1 { color: #f4f4f5; }
      .spinner { border-color: #27272a; border-top-color: #4d8bf0; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Mantenimiento basado en condición</div>
    <h1>Centro de control CBM ferroviario</h1>
    <p>Cargando dashboard&hellip;</p>
    <div class="spinner"></div>
  </div>
</body>
</html>
