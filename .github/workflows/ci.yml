name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-lock.txt
          python -m pip install --no-deps -e .

      - name: CLI smoke test
        run: railway-cbm --help

      - name: Lint
        run: python -m ruff check .

      - name: Format
        run: python -m ruff format --check .

      - name: Dependency lock drift
        run: python scripts/check_lock_drift.py

      - name: Dependency compatibility
        run: python -m pip check

      - name: Dependency vulnerability audit
        run: python -m pip_audit -r requirements-lock.txt --progress-spinner off

      - name: Pipeline, tests and coverage gate
        run: ./scripts/run_coverage.sh
