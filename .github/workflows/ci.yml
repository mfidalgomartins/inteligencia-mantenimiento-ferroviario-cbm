name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-lock.txt

      - name: Lint
        run: python -m ruff check .

      - name: Dependency lock drift
        run: python scripts/check_lock_drift.py

      - name: Pipeline, tests and coverage gate
        run: ./scripts/run_coverage.sh
